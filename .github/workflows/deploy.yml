name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write   # required for OIDC login
  contents: read

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}

jobs:
  # ── 1. Provision infrastructure via Bicep ──────────────────────
  infra:
    name: Provision Infrastructure (Bicep)
    runs-on: ubuntu-latest
    outputs:
      nodeAppName: ${{ steps.bicep.outputs.nodeAppName }}
      staticWebAppToken: ${{ steps.bicep.outputs.staticWebAppToken }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group if it does not exist
        run: |
          az group create \
            --name ${{ vars.AZURE_RESOURCE_GROUP }} \
            --location ${{ vars.AZURE_LOCATION || 'eastus' }} \
            --output none

      - name: Deploy Bicep template
        id: bicep
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --template-file bicep/main.bicep \
            --parameters \
                appName=${{ vars.APP_NAME || 'aigenius' }} \
                environment=${{ env.ENVIRONMENT }} \
            --query properties.outputs \
            --output json)

          NODE_APP_NAME="${{ vars.APP_NAME || 'aigenius' }}-nodeapp-${{ env.ENVIRONMENT }}"
          STATIC_TOKEN=$(echo "$OUTPUT" | jq -r '.staticWebAppToken.value // empty')

          echo "nodeAppName=${NODE_APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "staticWebAppToken=${STATIC_TOKEN}" >> "$GITHUB_OUTPUT"

          echo "### Bicep Outputs" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Static Web App URL | $(echo "$OUTPUT" | jq -r '.staticWebAppUrl.value') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node App Hostname | $(echo "$OUTPUT" | jq -r '.nodeAppHostname.value') |" >> "$GITHUB_STEP_SUMMARY"

  # ── 2. Build & deploy the .NET API to Azure App Service ────────
  deploy-api:
    name: Deploy API → Azure App Service
    runs-on: ubuntu-latest
    needs: infra
    defaults:
      run:
        working-directory: src/ai-genius-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish application
        run: dotnet publish -c Release -o ${{ github.workspace }}/api-publish

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.infra.outputs.nodeAppName }}
          package: ${{ github.workspace }}/api-publish

  # ── 3. Build & deploy the React app to Azure Static Web App ────
  deploy-web:
    name: Deploy Web → Azure Static Web App
    runs-on: ubuntu-latest
    needs: infra
    defaults:
      run:
        working-directory: src/ai-genius-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/ai-genius-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ needs.infra.outputs.staticWebAppToken || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "src/ai-genius-web"
          output_location: "dist"
          skip_app_build: true
